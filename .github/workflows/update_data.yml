name: Update Air Quality Data

# Runs automatically every hour, and can also be triggered manually from the Actions tab.
# This is what makes the project a genuine live pipeline instead of a one-time script:
# GitHub runs fetch_latest.py for you in the cloud, on schedule, forever, for free.
on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour (UTC)
  workflow_dispatch: {}    # lets you click "Run workflow" manually to test it

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest readings
        run: python scripts/fetch_latest.py

      - name: Commit updated database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/air_quality.db
          git diff --staged --quiet || git commit -m "Auto-update: latest air quality readings"
          git push
